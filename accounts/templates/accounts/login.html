{% extends "base.html" %}

{% block title %}
Login
{% endblock title %}

{% block content %}

<div class="flex justify-center items-center min-h-[85vh]">

    <!-- Login Card -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">

        <!-- Login Icon -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg"
                class="w-14 h-14 text-blue-600"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5">

                    <path stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-1.5 0h12a1.5 1.5 0 0 1 1.5 1.5v7.5a1.5 1.5 0 0 1-1.5 1.5h-12A1.5 1.5 0 0 1 4.5 19.5V12a1.5 1.5 0 0 1 1.5-1.5Z"/>
                </svg>
            </div>

            <!-- Heading -->
            <h1 class="text-3xl font-bold text-slate-800">
                Welcome Back
            </h1>

            <!-- Sub Heading -->
            <p class="text-slate-500 mt-2">
                Login to access your dashboard.
            </p>
        </div>

        <!-- Login Form -->
        <form method="POST" class="space-y-5">

            {% csrf_token %}

            <!-- Username Field -->
            <div>
                <label class="block mb-2 font-medium text-slate-700">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    required
                >
            </div>

            <!-- Password Field -->
            <div>
                <label class="block mb-2 font-medium text-slate-700">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    required
                >
            </div>

            <!-- Remember Me and Forgot Password -->
            <div class="flex items-center justify-between text-sm">

                <!-- Remember Me -->
                <label class="flex items-center gap-2 text-slate-600">
                    <input
                        type="checkbox"
                        name="remember_me"
                        class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                    >
                    Remember me
                </label>

                <!-- Forgot Password -->
                <a href="#"
                class="text-blue-600 hover:text-blue-700 hover:underline">
                    Forgot Password?
                </a>

            </div>

            <!-- Login Button -->
            <button
                type="submit"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-semibold hover:scale-105 transition duration-300 shadow-lg"
            >
                Login
            </button>

        </form>

        <!-- Register Link -->
        <p class="text-center mt-6 text-slate-600">
            Don't have an account?

            <a href="{% url 'register' %}"
            class="text-blue-600 font-semibold hover:underline">
            Create Account
            </a>
        </p>

    </div>

</div>

{% endblock content %}
